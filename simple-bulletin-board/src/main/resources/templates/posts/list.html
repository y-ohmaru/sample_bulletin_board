<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Simple Bulletin Board</title>
    <style>
        body {
            font-family: "Yu Gothic", sans-serif;
            margin: 2rem auto;
            max-width: 720px;
            line-height: 1.5;
        }
        h1, h2 {
            margin-bottom: 0.75rem;
        }
        form {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-top: 0.75rem;
        }
        input, textarea, button {
            font: inherit;
        }
        input, textarea {
            box-sizing: border-box;
            margin-top: 0.25rem;
            padding: 0.5rem;
            width: 100%;
        }
        textarea {
            min-height: 8rem;
            resize: vertical;
        }
        .error {
            color: #b00020;
            margin-top: 0.25rem;
        }
        .message {
            background: #fff4cc;
            border: 1px solid #e0c666;
            padding: 0.75rem;
        }
        .post {
            border: 1px solid #d0d7de;
            border-radius: 6px;
            margin-bottom: 1rem;
            padding: 1rem;
        }
        .post header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .post-meta {
            color: #57606a;
            font-size: 0.9rem;
        }
        .empty {
            color: #57606a;
        }
        .delete-form {
            margin: 0;
        }
    </style>
</head>
<body>
<h1>Simple Bulletin Board</h1>

<p th:if="${message}" class="message" th:text="${message}"></p>

<section>
    <h2>Create Post</h2>
    <form th:action="@{/posts}" th:object="${postForm}" method="post">
        <label for="name">Name</label>
        <input id="name" type="text" th:field="*{name}" maxlength="100">
        <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>

        <label for="content">Content</label>
        <textarea id="content" th:field="*{content}" maxlength="100"></textarea>
        <p class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>

        <button type="submit">Create</button>
    </form>
</section>

<section>
    <h2>Posts</h2>
    <p th:if="${#lists.isEmpty(posts)}" class="empty">No posts yet.</p>
    <article th:each="post : ${posts}" class="post">
        <header>
            <div>
                <strong th:text="${post.name}">name</strong>
                <div class="post-meta">
                    <span>ID: </span><span th:text="${post.id}">1</span>
                    <span> / </span>
                    <time th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-26 12:00</time>
                </div>
            </div>
            <form class="delete-form" th:action="@{/posts/{id}/delete(id=${post.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </header>
        <p th:text="${post.content}">content</p>
    </article>
</section>
</body>
</html>
